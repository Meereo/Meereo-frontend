services:

  postgres:
    image: postgres:16-alpine
    container_name: meereo-frontend-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: meereo
      POSTGRES_PASSWORD: meereo2026
      POSTGRES_DB: meereo_frontend
    ports:
      - '5433:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U meereo -d meereo_frontend']
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: meereo-frontend-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://meereo:meereo2026@postgres:5432/meereo_frontend
      JWT_SECRET: meereo-frontend-prod-secret-2026
      JWT_EXPIRES_IN: 7d
      ALLOWED_ORIGIN: https://dev.meereo.com
      FRONTEND_URL: https://dev.meereo.com
      BCRYPT_ROUNDS: '12'
      RESET_TOKEN_EXPIRES_MIN: '30'
    ports:
      - '3002:3001'
    volumes:
      - uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: meereo-web
    restart: unless-stopped
    ports:
      - '8080:80'
    depends_on:
      - api

networks:
  default:
    driver: bridge

volumes:
  pgdata:
  uploads:
