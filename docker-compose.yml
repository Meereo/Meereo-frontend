version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: meereo-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: meereo
      POSTGRES_PASSWORD: meereo2026
      POSTGRES_DB: meereo
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: meereo-cache
    restart: unless-stopped
    ports:
      - '6379:6379'

  minio:
    image: minio/minio:latest
    container_name: meereo-storage
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: meereo
      MINIO_ROOT_PASSWORD: meereo2026
    command: server /data --console-address ":9001"
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - miniodata:/data

volumes:
  pgdata:
  miniodata:
