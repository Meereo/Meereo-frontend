      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [montant]
              properties:
                projectId:
                  type: string
                montant:
                  type: number
                label:
                  type: string
      responses:
        '201':
          description: Budget créé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Transaction'

  /finance/budgets/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
    patch:
      tags: [Finance]
      summary: Mettre à jour un budget
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                montant:
                  type: number
                label:
                  type: string
                statut:
                  type: string
      responses:
        '200':
          description: Budget mis à jour
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Transaction'
    delete:
      tags: [Finance]
      summary: Supprimer un budget
      responses:
        '204':
          description: Supprimé

  /finance/expenses:
    get:
      tags: [Finance]
      summary: Lister les dépenses
      parameters:
        - name: projectId
          in: query
          schema:
            type: string
        - name: statut
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Dépenses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Transaction'
    post:
      tags: [Finance]
      summary: Créer une dépense
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [label, montant]
              properties:
                projectId:
                  type: string
                montant:
                  type: number
                label:
                  type: string
                statut:
                  type: string
                provider:
                  type: string
      responses:
        '201':
          description: Dépense créée
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Transaction'

  /finance/expenses/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
    patch:
      tags: [Finance]
      summary: Mettre à jour une dépense
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                montant:
                  type: number
                label:
                  type: string
                statut:
                  type: string
                provider:
                  type: string
      responses:
        '200':
          description: Dépense mise à jour
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Transaction'
    delete:
      tags: [Finance]
      summary: Supprimer une dépense
      responses:
        '204':
          description: Supprimée

  /finance/invoices:
    get:
      tags: [Finance]
      summary: Lister les factures
      parameters:
        - name: projectId
          in: query
          schema:
            type: string
        - name: statut
          in: query
          schema:
            type: string
            enum: [brouillon, emise, payee, validee]
      responses:
        '200':
          description: Factures
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Transaction'
    post:
      tags: [Finance]
      summary: Créer une facture (statut initial = brouillon)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [label, montant]
              properties:
                projectId:
                  type: string
                montant:
                  type: number
                label:
                  type: string
                provider:
                  type: string
      responses:
        '201':
          description: Facture créée
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Transaction'

  /finance/invoices/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
    patch:
      tags: [Finance]
      summary: Mettre à jour / avancer le workflow d'une facture
      description: |
        Workflow : brouillon → emise → payee → validee
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                montant:
                  type: number
                label:
                  type: string
                statut:
                  type: string
                  enum: [brouillon, emise, payee, validee]
                provider:
                  type: string
      responses:
        '200':
          description: Facture mise à jour
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Transaction'
        '400':
          description: Statut invalide
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /finance/reports/{projectId}:
    parameters:
      - name: projectId
        in: path
        required: true
        schema:
          type: string
    get:
      tags: [Finance]
      summary: Rapport financier d'un projet (KPIs + ventilation mensuelle)
      responses:
        '200':
          description: Rapport complet
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FinanceReport'
        '404':
          description: Projet introuvable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ─────────────────────────────────────────
  #  PAYMENTS (Escrow)
  # ─────────────────────────────────────────

  /payments:
    get:
      tags: [Paiements Escrow]
      summary: Lister les ordres de paiement
      parameters:
        - name: projectId
          in: query
          schema:
            type: string
        - name: marketId
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
            enum: [PAY_INIT, PAY_PENDING, FUNDS_CONFIRMED, HELD_FOR_MILESTONE, PAYOUT_REQUESTED, PAYOUT_DONE, DISPUTE_OPEN, REVERSED]
      responses:
        '200':
          description: Ordres de paiement
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PaymentOrder'
    post:
      tags: [Paiements Escrow]
      summary: Créer un ordre de paiement
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [amount]
              properties:
                amount:
                  type: number
                rail:
                  type: string
                  enum: [virement, carte, mobile_money, wave, orange_money, mtn]
                label:
                  type: string
                projectId:
                  type: string
                marketId:
                  type: string
                milestones:
                  type: array
                  items:
                    type: object
                    properties:
                      title:
                        type: string
                      amount:
                        type: number
                      dueAt:
                        type: string
                        format: date-time
      responses:
        '201':
          description: Ordre créé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentOrder'

  /payments/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
    get:
      tags: [Paiements Escrow]
      summary: Récupérer un ordre de paiement (avec jalons, preuves, validations)
      responses:
        '200':
          description: Ordre de paiement complet
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentOrder'
        '404':
          description: Non trouvé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /payments/{id}/status:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
    patch:
      tags: [Paiements Escrow]
      summary: Changer le statut d'un ordre de paiement
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  type: string
                  enum: [PAY_INIT, PAY_PENDING, FUNDS_CONFIRMED, HELD_FOR_MILESTONE, PAYOUT_REQUESTED, PAYOUT_DONE, DISPUTE_OPEN, REVERSED]
                disputeReason:
                  type: string
                  description: Requis si status = DISPUTE_OPEN
      responses:
        '200':
          description: Ordre mis à jour
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentOrder'

  /payments/{id}/milestones/{milestoneId}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
      - name: milestoneId
        in: path
        required: true
        schema:
          type: string
    patch:
      tags: [Paiements Escrow]
      summary: Mettre à jour un jalon de paiement
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  enum: [pending, in_progress, completed, disputed]
                completedAt:
                  type: string
                  format: date-time
      responses:
        '200':
          description: Jalon mis à jour
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Milestone'

  /payments/{id}/proofs:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
    post:
      tags: [Paiements Escrow]
      summary: Ajouter une preuve de paiement
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [url]
              properties:
                type:
                  type: string
                  enum: [document, photo, pv, bon_livraison]
                url:
                  type: string
      responses:
        '201':
          description: Preuve ajoutée
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentProof'

  /payments/{id}/validate:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
    post:
      tags: [Paiements Escrow]
      summary: Valider (ou rejeter) un ordre de paiement
      description: Si `validated = true`, le statut passe automatiquement à FUNDS_CONFIRMED.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [validated]
              properties:
                validated:
                  type: boolean
                comment:
                  type: string
      responses:
        '201':
          description: Validation enregistrée
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentValidation'

  /payments/{id}/logs:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
    get:
      tags: [Paiements Escrow]
      summary: Historique (preuves + validations) d'un ordre de paiement
      responses:
        '200':
          description: Logs
          content:
            application/json:
              schema:
                type: object
                properties:
                  proofs:
                    type: array
                    items:
                      $ref: '#/components/schemas/PaymentProof'
                  validations:
                    type: array
                    items:
                      $ref: '#/components/schemas/PaymentValidation'

  /payments/initiate/wave:
    post:
      tags: [Paiements Escrow]
      summary: Initier un paiement Wave CI (non implémenté)
      responses:
        '501':
          description: Intégration à venir
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  provider:
                    type: string

  /payments/initiate/orange-money:
    post:
      tags: [Paiements Escrow]
      summary: Initier un paiement Orange Money (non implémenté)
      responses:
        '501':
          description: Intégration à venir
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  provider:
                    type: string

  /payments/initiate/mtn:
    post:
      tags: [Paiements Escrow]
      summary: Initier un paiement MTN MoMo (non implémenté)
      responses:
        '501':
          description: Intégration à venir
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  provider:
                    type: string

  /payments/webhook:
    post:
      tags: [Paiements Escrow]
      summary: Webhook de callback provider de paiement
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: Corps dépendant du provider
      responses:
        '200':
          description: Webhook reçu
          content:
            application/json:
              schema:
                type: object
                properties:
                  received:
                    type: boolean

  # ─────────────────────────────────────────
  #  UPLOAD (MinIO)
  # ─────────────────────────────────────────

  /upload:
    post:
      tags: [Upload]
      summary: Uploader un fichier vers MinIO (base64)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  description: Data URL base64 (ex. data:image/png;base64,...)
                folder:
                  type: string
                  description: Dossier de destination (ex. projects, avatars, documents)
                  default: uploads
                filename:
                  type: string
                  description: Nom de fichier souhaité (sans extension)
      responses:
        '201':
          description: Fichier uploadé
          content:
            application/json:
              schema:
                type: object
                properties:
                  url:
                    type: string
                    description: URL publique MinIO
                  objectName:
                    type: string
                  size:
                    type: integer
                  contentType:
                    type: string
        '400':
          description: Fichier manquant ou format invalide
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /upload/{objectName}:
    parameters:
      - name: objectName
        in: path
        required: true
        schema:
          type: string
        description: Nom de l'objet MinIO (ex. projects/abc123_photo.png)
    delete:
      tags: [Upload]
      summary: Supprimer un fichier de MinIO
      responses:
        '204':
          description: Fichier supprimé

  # ─────────────────────────────────────────
  #  KAI — Assistant IA
  # ─────────────────────────────────────────

  /kai/chat:
    post:
      tags: [KAI]
      summary: Envoyer un message à l'assistant IA KAI (Claude)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [message]
              properties:
                message:
                  type: string
                  description: Question ou demande de l'utilisateur
                context:
                  type: object
                  description: Données contextuelles du compte utilisateur
                  properties:
                    userType:
                      type: string
                      enum: [pro, client, fournisseur]
                    userName:
                      type: string
                    userCompany:
                      type: string
                    projects:
                      type: array
                      items:
                        type: object
                    pendingOffers:
                      type: integer
                    pendingDecisions:
                      type: integer
                    unreadMessages:
                      type: integer
                    activeMarkets:
                      type: integer
                    documentsCount:
                      type: integer
                    productsCount:
                      type: integer
                    pendingOrders:
                      type: integer
                    teamMembers:
                      type: array
                      items:
                        type: object
      responses:
        '200':
          description: Réponse de KAI
          content:
            application/json:
              schema:
                type: object
                properties:
                  response:
                    type: string
        '400':
          description: Message manquant
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '503':
          description: API Anthropic non configurée
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  fallback:
                    type: boolean

  # ─────────────────────────────────────────
  #  INTEGRATIONS (catalogue statique)
  # ─────────────────────────────────────────

  /integrations:
    get:
      tags: [Système]
      summary: Catalogue des intégrations disponibles (statique)
      responses:
        '200':
          description: Liste des intégrations
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: string
                    nom:
                      type: string
                    desc:
                      type: string
                    cat:
                      type: string
                    logo:
                      type: string

tags:
  - name: Système
    description: Health check et données système
  - name: Auth
    description: Authentification et gestion de compte
  - name: Users
    description: Gestion des utilisateurs et annuaire des professionnels
  - name: Projects
    description: Projets et membres d'équipe
  - name: Appels d'Offres
    description: Appels d'offres (AO)
  - name: Offres
    description: Offres en réponse aux AO
  - name: Marchés
    description: Marchés conclus
  - name: Tâches
    description: Gestion des tâches
  - name: Documents
    description: Documents de projet
  - name: Photos
    description: Photos de chantier
  - name: Agenda
    description: Événements et planning
  - name: Décisions
    description: Décisions de projet
  - name: Marketplace
    description: Produits et catégories de la marketplace
  - name: Commandes
    description: Commandes marketplace
  - name: Messagerie
    description: Conversations et messages
  - name: Notifications
    description: Notifications et activités
  - name: Rapports
    description: Rapports de chantier
  - name: Transactions
    description: Transactions financières génériques
  - name: Finance
    description: Budgets, dépenses, factures et KPIs financiers
  - name: Paiements Escrow
    description: Ordres de paiement sécurisés avec jalons et preuves
  - name: Répertoire
    description: Clients, intervenants et fournisseurs
  - name: Commission
    description: Introductions et suivi des commissions clé en main
  - name: Upload
    description: Upload de fichiers vers MinIO
  - name: KAI
    description: Assistant IA MEEREO (powered by Claude)
