      responses:
        '200':
          description: Liste des AO
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AO'
    post:
      tags: [Appels d'Offres]
      summary: Créer un appel d'offres
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title]
              properties:
                title:
                  type: string
                description:
                  type: string
                budget:
                  type: string
                lot:
                  type: string
                status:
                  type: string
                projectId:
                  type: string
                ownerUserId:
                  type: string
                ownerProfileType:
                  type: string
                requestedTrade:
                  type: string
                visibilityScope:
                  type: string
                  enum: [public, trade_only, restricted]
                createdByClient:
                  type: boolean
      responses:
        '201':
          description: AO créé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AO'

  /aos/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
    get:
      tags: [Appels d'Offres]
      summary: Récupérer un AO
      responses:
        '200':
          description: AO
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AO'
        '404':
          description: Non trouvé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    put:
      tags: [Appels d'Offres]
      summary: Mettre à jour un AO
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AO'
      responses:
        '200':
          description: AO mis à jour
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AO'
    delete:
      tags: [Appels d'Offres]
      summary: Supprimer un AO (avec règles métier)
      description: |
        - Si un marché a été créé depuis cet AO → 409 (archive only)
        - Si des offres existent → statut mis à `cancelled_by_owner`, pas de suppression
        - Sinon → suppression réelle
      responses:
        '204':
          description: AO supprimé
        '200':
          description: AO annulé (des offres existaient)
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  action:
                    type: string
                    example: cancelled
                  ao:
                    $ref: '#/components/schemas/AO'
        '403':
          description: Non propriétaire de l'AO
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: AO introuvable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Un marché existe déjà — archiver uniquement
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  action:
                    type: string
                    example: archive_only

