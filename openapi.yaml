openapi: 3.0.3
info:
  title: MEEREO API
  description: >
    API de la plateforme MEEREO — gestion de projets BTP et immobilier en Afrique de l'Ouest.
    Inclut la gestion de projets, appels d'offres, marchés, paiements escrow, finances, marketplace et l'assistant IA KAI.
  version: 1.0.0

servers:
  - url: http://localhost:3001/api
    description: Serveur de développement

security:
  - bearerAuth: []

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Error:
      type: object
      properties:
        error:
          type: string

    User:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
          format: email
        name:
          type: string
        type:
          type: string
          enum: [pro, client, fournisseur]
        company:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
        avatar:
          type: string
          nullable: true
        metier:
          type: string
          nullable: true
        ville:
          type: string
          nullable: true
        verified:
          type: boolean
        emailVerified:
          type: boolean
        createdAt:
          type: string
          format: date-time

    Project:
      type: object
      properties:
        id:
          type: string
        nom:
          type: string
        type:
          type: string
          nullable: true
        phase:
          type: string
        budget:
          type: string
          nullable: true
        adresse:
          type: string
          nullable: true
        livraison:
          type: string
          nullable: true
        priorite:
          type: string
        description:
          type: string
          nullable: true
        avancement:
          type: integer
        status:
          type: string
        kanbanStatus:
          type: string
          enum: [todo, in_progress, done]
        img:
          type: string
          nullable: true
        client:
          type: string
          nullable: true
        clientEmail:
          type: string
          nullable: true
        color:
          type: string
          nullable: true
        clientId:
          type: string
          nullable: true
        sourceAoId:
          type: string
          nullable: true
        etapes:
          type: array
          nullable: true
          items:
            type: object
        equipe:
          type: array
          nullable: true
          items:
            type: object
        ownerId:
          type: string
        createdAt:
          type: string
          format: date-time

    AO:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        description:
          type: string
          nullable: true
        budget:
          type: string
          nullable: true
        lot:
          type: string
          nullable: true
        status:
          type: string
        ownerUserId:
          type: string
          nullable: true
        ownerProfileType:
          type: string
          nullable: true
        requestedTrade:
          type: string
          nullable: true
        visibilityScope:
          type: string
          enum: [public, trade_only, restricted]
        createdByClient:
          type: boolean
        projectId:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time

    Offer:
      type: object
      properties:
        id:
          type: string
        titre:
          type: string
        entreprise:
          type: string
          nullable: true
        montant:
          type: string
          nullable: true
        delai:
          type: string
          nullable: true
        lot:
          type: string
          nullable: true
        note:
          type: string
          nullable: true
        message:
          type: string
          nullable: true
        statut:
          type: string
        aoId:
          type: string
          nullable: true
        userId:
          type: string
          nullable: true
        supplierId:
          type: string
          nullable: true
        supplierRole:
          type: string
          nullable: true
        acceptedBy:
          type: string
          nullable: true
        acceptedAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time

    Market:
      type: object
      properties:
        id:
          type: string
        titre:
          type: string
          nullable: true
        entreprise:
          type: string
        lot:
          type: string
          nullable: true
        montant:
          type: string
          nullable: true
        statut:
          type: string
        avancement:
          type: integer
        delai:
          type: string
          nullable: true
        projectId:
          type: string
          nullable: true
        offerId:
          type: string
          nullable: true
        aoId:
          type: string
          nullable: true
        clientId:
          type: string
          nullable: true
        supplierId:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time

    Task:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        description:
          type: string
          nullable: true
        status:
          type: string
          enum: [todo, in_progress, done, validated, rejected]
        priority:
          type: string
          enum: [basse, normale, haute, urgente]
        progress:
          type: integer
        dueDate:
          type: string
          format: date-time
          nullable: true
        projectId:
          type: string
          nullable: true
        marketId:
          type: string
          nullable: true
        assignedTo:
          type: string
          nullable: true
        validatedBy:
          type: string
          nullable: true
        validatedAt:
          type: string
          format: date-time
          nullable: true
        rejectedBy:
          type: string
          nullable: true
        rejectedAt:
          type: string
          format: date-time
          nullable: true
        comment:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time

    Document:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        type:
          type: string
        url:
          type: string
          nullable: true
        projectId:
          type: string
          nullable: true
        userId:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time

    Transaction:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
          enum: [budget, depense, facture, credit, debit, paiement]
        label:
          type: string
        montant:
          type: number
        statut:
          type: string
        provider:
          type: string
          nullable: true
        userId:
          type: string
          nullable: true
        projectId:
          type: string
          nullable: true
        marketId:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time

    PaymentOrder:
      type: object
      properties:
        id:
          type: string
        amount:
          type: number
        status:
          type: string
          enum: [PAY_INIT, PAY_PENDING, FUNDS_CONFIRMED, HELD_FOR_MILESTONE, PAYOUT_REQUESTED, PAYOUT_DONE, DISPUTE_OPEN, REVERSED]
        rail:
          type: string
          enum: [virement, carte, mobile_money, wave, orange_money, mtn]
          nullable: true
        label:
          type: string
          nullable: true
        disputeReason:
          type: string
          nullable: true
        resolvedAt:
          type: string
          format: date-time
          nullable: true
        projectId:
          type: string
          nullable: true
        marketId:
          type: string
          nullable: true
        payerId:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        milestones:
          type: array
          items:
            $ref: '#/components/schemas/Milestone'
        proofs:
          type: array
          items:
            $ref: '#/components/schemas/PaymentProof'

    Milestone:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        amount:
          type: number
        status:
          type: string
          enum: [pending, in_progress, completed, disputed]
        order:
          type: integer
        marketId:
          type: string
          nullable: true
        paymentOrderId:
          type: string
          nullable: true
        dueAt:
          type: string
          format: date-time
          nullable: true
        completedAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time

    PaymentProof:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
          enum: [document, photo, pv, bon_livraison]
        url:
          type: string
        paymentOrderId:
          type: string
        uploadedBy:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time

    PaymentValidation:
      type: object
      properties:
        id:
          type: string
        validated:
          type: boolean
        comment:
          type: string
          nullable: true
        paymentOrderId:
          type: string
        validatedBy:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time

    Notification:
      type: object
      properties:
        id:
          type: string
        msg:
          type: string
        type:
          type: string
        read:
          type: boolean
        role:
          type: string
          nullable: true
        userId:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time

    Activity:
      type: object
      properties:
        id:
          type: string
        action:
          type: string
        data:
          type: object
          nullable: true
        userId:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time

    Conversation:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
          nullable: true
        projectId:
          type: string
          nullable: true
        aoId:
          type: string
          nullable: true
        offerId:
          type: string
          nullable: true
        marketId:
          type: string
          nullable: true
        participants:
          type: array
          nullable: true
          items:
            type: string
        lastMessage:
          type: string
          nullable: true
        lastAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time

    Message:
      type: object
      properties:
        id:
          type: string
        contenu:
          type: string
        conversationId:
          type: string
          nullable: true
        userId:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time

    Product:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        category:
          type: string
          nullable: true
        price:
          type: number
          nullable: true
        unit:
          type: string
        photoUrl:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
        userId:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time

    Commande:
      type: object
      properties:
        id:
          type: string
        reference:
          type: string
          nullable: true
        statut:
          type: string
        total:
          type: number
        projectId:
          type: string
          nullable: true
        userId:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time

    Fournisseur:
      type: object
      properties:
        id:
          type: string
        nom:
          type: string
        specialite:
          type: string
          nullable: true
        ville:
          type: string
          nullable: true
        tel:
          type: string
          nullable: true
        email:
          type: string
          nullable: true
        statut:
          type: string
        verified:
          type: boolean
        note:
          type: number
        createdAt:
          type: string
          format: date-time

    Rapport:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
        titre:
          type: string
          nullable: true
        statut:
          type: string
        projectId:
          type: string
          nullable: true
        userId:
          type: string
          nullable: true
        contenu:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time

    Client:
      type: object
      properties:
        id:
          type: string
        nom:
          type: string
        type:
          type: string
          nullable: true
        statut:
          type: string
        email:
          type: string
          nullable: true
        tel:
          type: string
          nullable: true
        ville:
          type: string
          nullable: true
        projectId:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time

    Intervenant:
      type: object
      properties:
        id:
          type: string
        nom:
          type: string
        role:
          type: string
          nullable: true
        specialite:
          type: string
          nullable: true
        email:
          type: string
          nullable: true
        tel:
          type: string
          nullable: true
        projectId:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time

    ProjectMember:
      type: object
      properties:
        id:
          type: string
        projectId:
          type: string
        userId:
          type: string
        role:
          type: string
        userName:
          type: string
          nullable: true
        userEmail:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time

    Event:
      type: object
      properties:
        id:
          type: string
        titre:
          type: string
        date:
          type: string
        heure:
          type: string
          nullable: true
        type:
          type: string
          nullable: true
        color:
          type: string
          nullable: true
        projectId:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time

    Decision:
      type: object
      properties:
        id:
          type: string
        titre:
          type: string
        desc:
          type: string
          nullable: true
        statut:
          type: string
        urgent:
          type: boolean
        projectId:
          type: string
          nullable: true
        visibility:
          type: string
        createdAt:
          type: string
          format: date-time

    Introduction:
      type: object
      properties:
        id:
          type: string
        projectId:
          type: string
          nullable: true
        clientId:
          type: string
          nullable: true
        structureId:
          type: string
          nullable: true
        structureName:
          type: string
          nullable: true
        metier:
          type: string
          nullable: true
        status:
          type: string
        source:
          type: string
        createdAt:
          type: string
          format: date-time

    Commission:
      type: object
      properties:
        id:
          type: string
        introductionId:
          type: string
          nullable: true
        structureId:
          type: string
          nullable: true
        structureName:
          type: string
          nullable: true
        projectId:
          type: string
          nullable: true
        clientId:
          type: string
          nullable: true
        montantBase:
          type: integer
        montantCommission:
          type: integer
        rate:
          type: number
        status:
          type: string
        createdAt:
          type: string
          format: date-time

    Photo:
      type: object
      properties:
        id:
          type: string
        url:
          type: string
        caption:
          type: string
          nullable: true
        projectId:
          type: string
          nullable: true
        userId:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time

    MarketplaceCategory:
      type: object
      properties:
        id:
          type: string
        slug:
          type: string
        label:
          type: string
        ico:
          type: string
          nullable: true
        order:
          type: integer

    FinanceReport:
      type: object
      properties:
        project:
          type: object
          properties:
            id:
              type: string
            nom:
              type: string
            budget:
              type: string
              nullable: true
            avancement:
              type: integer
            phase:
              type: string
            priorite:
              type: string
        kpi:
          type: object
          properties:
            totalBudget:
              type: number
            totalExpenses:
              type: number
            totalInvoiced:
              type: number
            totalPaid:
              type: number
            totalCredits:
              type: number
            remaining:
              type: number
            burnRate:
              type: integer
              description: Pourcentage des dépenses sur le budget
            invoiceCollectionRate:
              type: integer
              description: Pourcentage des factures encaissées
        transactions:
          type: object
          properties:
            budgets:
              type: array
              items:
                $ref: '#/components/schemas/Transaction'
            expenses:
              type: array
              items:
                $ref: '#/components/schemas/Transaction'
            invoices:
              type: array
              items:
                $ref: '#/components/schemas/Transaction'
            credits:
              type: array
              items:
                $ref: '#/components/schemas/Transaction'
        monthlyBreakdown:
          type: array
          items:
            type: object
            properties:
              month:
                type: string
                example: "2025-06"
              budgets:
                type: number
              depenses:
                type: number
              factures:
                type: number
              paye:
                type: number

paths:

  # ─────────────────────────────────────────
  #  HEALTH
  # ─────────────────────────────────────────

  /health:
    get:
      tags: [Système]
      summary: Healthcheck
      security: []
      responses:
        '200':
          description: Serveur opérationnel
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  db:
                    type: string
                    example: postgresql
                  ts:
                    type: string
                    format: date-time

  # ─────────────────────────────────────────
  #  AUTH
  # ─────────────────────────────────────────

  /auth/register:
    post:
      tags: [Auth]
      summary: Créer un compte
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 8
                name:
                  type: string
                type:
                  type: string
                  enum: [pro, client, fournisseur]
                  default: pro
                company:
                  type: string
                phone:
                  type: string
                avatar:
                  type: string
                  description: URL MinIO ou data URL base64
      responses:
        '201':
          description: Compte créé
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/User'
                  token:
                    type: string
        '400':
          description: Email ou mot de passe manquant
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Email déjà utilisé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/login:
    post:
      tags: [Auth]
      summary: Se connecter
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
      responses:
        '200':
          description: Connexion réussie
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/User'
                  token:
                    type: string
        '401':
          description: Mot de passe incorrect
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Utilisateur non trouvé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '410':
          description: Compte supprimé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/me:
    get:
      tags: [Auth]
      summary: Profil de l'utilisateur connecté
      responses:
        '200':
          description: Profil utilisateur
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          description: Token manquant ou invalide
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/send-verification:
    post:
      tags: [Auth]
      summary: Envoyer un email de vérification
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
      responses:
        '200':
          description: Email envoyé
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string

  /auth/verify-email:
    post:
      tags: [Auth]
      summary: Vérifier l'adresse email (via token lien ou code)
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
                token:
                  type: string
                  description: JWT reçu par lien email
                code:
                  type: string
                  description: Code court (fallback)
      responses:
        '200':
          description: Email vérifié
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  verified:
                    type: boolean
        '400':
          description: Token/code invalide ou expiré
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/change-password:
    post:
      tags: [Auth]
      summary: Changer le mot de passe
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [currentPassword, newPassword]
              properties:
                currentPassword:
                  type: string
                newPassword:
                  type: string
                  minLength: 8
      responses:
        '200':
          description: Mot de passe mis à jour
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
        '401':
          description: Mot de passe actuel incorrect
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/delete-account:
    delete:
      tags: [Auth]
      summary: Supprimer le compte et toutes les données
      responses:
        '200':
          description: Compte, données et fichiers supprimés
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
        '401':
          description: Token manquant ou invalide
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ─────────────────────────────────────────
  #  USERS
  # ─────────────────────────────────────────

  /users:
    get:
      tags: [Users]
      summary: Lister les utilisateurs
      responses:
        '200':
          description: Liste des utilisateurs (sans mot de passe)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'
    post:
      tags: [Users]
      summary: Créer un utilisateur
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                name:
                  type: string
